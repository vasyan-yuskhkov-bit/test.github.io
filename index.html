<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Клещевой энцефалит — Тест знаний</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
  <div class="container">

    <!-- Старт -->
    <div id="start" class="screen active">
      <div class="card">
        <h1>🛡️ Клещевой энцефалит</h1>
        <p>Проверь свои знания о защите от опасного вируса</p>
        <button onclick="startTest()">Начать тест</button>
      </div>
    </div>

    <!-- Опрос -->
    <div id="quiz" class="screen">
      <div class="card">
        <div class="progress">Вопрос <span id="current">1</span>/10</div>
        <h2 id="question"></h2>
        <div id="options"></div>
        <button id="nextBtn" onclick="nextQuestion()" class="hidden">Далее →</button>
      </div>
    </div>

    <!-- Результат -->
    <div id="result" class="screen">
      <div class="card">
        <h2>Ваш результат</h2>
        <div id="scoreCircle"></div>
        <p id="resultText"></p>
        <div id="recommendation"></div>
        <button onclick="restart()">Пройти заново</button>
        <button onclick="showStatistics()" class="secondary">📊 Статистика</button>
      </div>
    </div>

    <!-- Статистика -->
    <div id="stats" class="screen">
      <div class="card">
        <h2>📊 Статистика прохождений</h2>
        <div id="statsContent"></div>
        <button onclick="hideStatistics()">← Назад</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
