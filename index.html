<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Клещевой энцефалит — Тест</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
  <div class="container">

    <!-- Старт -->
    <div id="start" class="screen active">
      <div class="card">
        <h1>🛡️ Клещевой энцефалит</h1>
        <p>Проверьте свои знания о профилактике</p>
        <button onclick="startTest()">Начать тест</button>
      </div>
    </div>

    <!-- Вопрос -->
    <div id="quiz" class="screen">
      <div class="card">
        <div class="progress">Вопрос <span id="current">1</span>/10</div>
        <h2 id="question"></h2>
        <div id="options" class="options"></div>
        <button id="nextBtn" onclick="nextQuestion()" class="hidden">Далее →</button>
      </div>
    </div>

    <!-- Результат -->
    <div id="result" class="screen">
      <div class="card">
        <h2>Ваш результат</h2>
        <div id="scoreCircle" class="score-circle"></div>
        <p id="resultText" class="result-text"></p>
        <div id="recommendation" class="recommendation"></div>
        <button onclick="restart()">Пройти заново</button>
        <button onclick="showAdmin()" class="secondary">👨‍💼 Админ-панель</button>
      </div>
    </div>

    <!-- Админ-панель -->
    <div id="admin" class="screen">
      <div class="card">
        <h2>👨‍💼 Админ-панель</h2>
        <input type="password" id="adminPass" placeholder="Введите пароль" class="admin-input">
        <button onclick="checkAdminPassword()">Войти</button>
        <div id="adminContent" class="hidden">
          <h3>Результаты пользователей</h3>
          <div id="adminStats"></div>
          <button onclick="clearAllResults()">Очистить все результаты</button>
        </div>
        <button onclick="hideAdmin()" class="secondary">← Назад</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
